<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Metrix Timer — 15s príprava + 1 min</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Metrix">
<meta name="theme-color" content="#0A0A0A">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230A0A0A'/%3E%3Ctext x='90' y='118' font-family='monospace' font-size='80' font-weight='800' fill='%2300E676' text-anchor='middle'%3E1:00%3C/text%3E%3C/svg%3E">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230A0A0A'/%3E%3Ctext x='16' y='22' font-family='monospace' font-size='14' font-weight='800' fill='%2300E676' text-anchor='middle'%3E1:00%3C/text%3E%3C/svg%3E">
<style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
        --bg: #0A0A0A;
        --panel: #111111;
        --text: #FFFFFF;
        --muted: #5A5A5A;
        --prep: #FFB300;
        --work: #00E676;
        --done: #2979FF;
        --danger: #FF1744;
    }

    html, body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
    }

    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        min-height: 100dvh;
        padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
        transition: background 0.4s ease;
        overscroll-behavior: none;
        touch-action: manipulation;
    }

    body.state-prep { background: #1A1100; }
    body.state-work { background: #001A0A; }
    body.state-done { background: #00071A; }

    .label {
        font-size: clamp(18px, 4vw, 32px);
        font-weight: 700;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: clamp(12px, 2vh, 28px);
        transition: color 0.3s ease;
        text-align: center;
    }

    body.state-prep .label { color: var(--prep); }
    body.state-work .label { color: var(--work); }
    body.state-done .label { color: var(--done); }

    .timer {
        font-family: 'JetBrains Mono', 'SF Mono', 'Courier New', monospace;
        font-size: clamp(120px, 32vw, 360px);
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.04em;
        font-variant-numeric: tabular-nums;
        color: var(--text);
        text-shadow: 0 0 60px rgba(255,255,255,0.05);
        transition: color 0.3s ease, transform 0.15s ease;
    }

    body.state-prep .timer { color: var(--prep); text-shadow: 0 0 80px rgba(255,179,0,0.25); }
    body.state-work .timer { color: var(--work); text-shadow: 0 0 80px rgba(0,230,118,0.25); }
    body.state-done .timer { color: var(--done); text-shadow: 0 0 80px rgba(41,121,255,0.3); }

    .timer.pulse { animation: pulse 0.4s ease; }
    .timer.danger { color: var(--danger) !important; text-shadow: 0 0 80px rgba(255,23,68,0.4) !important; }

    @keyframes pulse {
        0% { transform: scale(1); }
        40% { transform: scale(1.05); }
        100% { transform: scale(1); }
    }

    .progress {
        width: min(560px, 90vw);
        height: 6px;
        background: rgba(255,255,255,0.08);
        border-radius: 3px;
        overflow: hidden;
        margin-top: clamp(20px, 4vh, 40px);
    }

    .progress-bar {
        height: 100%;
        width: 0%;
        background: var(--muted);
        transition: width 0.1s linear, background 0.3s ease;
    }

    body.state-prep .progress-bar { background: var(--prep); }
    body.state-work .progress-bar { background: var(--work); }
    body.state-done .progress-bar { background: var(--done); width: 100% !important; }

    .controls {
        margin-top: clamp(28px, 5vh, 56px);
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
    }

    button {
        font-family: inherit;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        padding: 18px 44px;
        border: 2px solid var(--text);
        background: transparent;
        color: var(--text);
        cursor: pointer;
        border-radius: 6px;
        transition: all 0.2s ease;
        min-width: 160px;
    }

    button:hover:not(:disabled) {
        background: var(--text);
        color: var(--bg);
    }

    button.primary {
        background: var(--text);
        color: var(--bg);
    }

    button.primary:hover:not(:disabled) {
        background: transparent;
        color: var(--text);
    }

    button:disabled {
        opacity: 0.3;
        cursor: not-allowed;
    }

    .phase-info {
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--muted);
        text-align: center;
    }

    .phase-info span {
        color: var(--text);
    }

    .fs-btn {
        position: fixed;
        top: 18px;
        right: 18px;
        width: 48px;
        height: 48px;
        min-width: 0;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid rgba(255,255,255,0.2);
        background: rgba(255,255,255,0.04);
        color: var(--text);
        border-radius: 50%;
        cursor: pointer;
        transition: all 0.2s ease;
        z-index: 10;
    }

    .fs-btn:hover {
        background: rgba(255,255,255,0.12);
        border-color: var(--text);
        transform: scale(1.05);
    }

    body.is-fullscreen .phase-info,
    body.is-fullscreen .fs-btn svg.icon-enter { display: none; }
    body:not(.is-fullscreen) .fs-btn svg.icon-exit { display: none; }

    @media (max-height: 500px) {
        .label { margin-bottom: 8px; }
        .progress { margin-top: 16px; }
        .controls { margin-top: 20px; }
        button { padding: 12px 28px; font-size: 14px; }
    }
</style>
</head>
<body class="state-idle">
    <div class="phase-info">Príprava <span>15s</span> &nbsp;→&nbsp; Práca <span>1:00</span></div>

    <button class="fs-btn" id="fsBtn" title="Celá obrazovka (F)" aria-label="Celá obrazovka">
        <svg class="icon-enter" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/>
        </svg>
        <svg class="icon-exit" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 4v5H4M15 4v5h5M9 20v-5H4M15 20v-5h5"/>
        </svg>
    </button>

    <div class="label" id="label">Pripravený?</div>
    <div class="timer" id="timer">01:00</div>

    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="controls">
        <button class="primary" id="startBtn">Štart</button>
        <button id="resetBtn" disabled>Reset</button>
    </div>

<script>
(() => {
    const PREP_SECONDS = 15;
    const WORK_SECONDS = 60;

    const body = document.body;
    const labelEl = document.getElementById('label');
    const timerEl = document.getElementById('timer');
    const progressBar = document.getElementById('progressBar');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');

    let state = 'idle';
    let endsAt = 0;
    let totalMs = 0;
    let rafId = null;
    let lastWholeSecond = -1;

    let wakeLock = null;
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        } catch (e) {}
    }
    function releaseWakeLock() {
        try { if (wakeLock) { wakeLock.release(); wakeLock = null; } } catch (e) {}
    }
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && (state === 'prep' || state === 'work')) {
            requestWakeLock();
        }
    });

    let audioCtx = null;
    function beep(freq = 880, duration = 0.12, volume = 0.25) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        } catch (e) {}
    }

    function format(seconds) {
        seconds = Math.max(0, Math.ceil(seconds));
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

    function setBodyState(s) {
        body.classList.remove('state-idle', 'state-prep', 'state-work', 'state-done');
        body.classList.add('state-' + s);
    }

    function pulse() {
        timerEl.classList.remove('pulse');
        void timerEl.offsetWidth;
        timerEl.classList.add('pulse');
    }

    function tick() {
        const now = performance.now();
        const remainingMs = endsAt - now;
        const remainingSec = remainingMs / 1000;

        timerEl.classList.toggle('danger', state === 'work' && remainingSec <= 5 && remainingSec > 0);

        timerEl.textContent = format(remainingSec);

        const elapsed = totalMs - remainingMs;
        const pct = Math.min(100, Math.max(0, (elapsed / totalMs) * 100));
        progressBar.style.width = pct + '%';

        const wholeSec = Math.ceil(remainingSec);
        if (wholeSec !== lastWholeSecond && wholeSec >= 0) {
            lastWholeSecond = wholeSec;
            if (state === 'prep' && wholeSec <= 3 && wholeSec > 0) {
                beep(660, 0.1, 0.2);
                pulse();
            } else if (state === 'work' && wholeSec <= 3 && wholeSec > 0) {
                beep(880, 0.12, 0.25);
                pulse();
            }
        }

        if (remainingMs <= 0) {
            if (state === 'prep') {
                startWork();
            } else if (state === 'work') {
                finish();
            }
            return;
        }

        rafId = requestAnimationFrame(tick);
    }

    function startPrep() {
        state = 'prep';
        setBodyState('prep');
        labelEl.textContent = 'Príprava';
        totalMs = PREP_SECONDS * 1000;
        endsAt = performance.now() + totalMs;
        lastWholeSecond = -1;
        startBtn.disabled = true;
        resetBtn.disabled = false;
        beep(440, 0.15, 0.25);
        requestWakeLock();
        rafId = requestAnimationFrame(tick);
    }

    function startWork() {
        state = 'work';
        setBodyState('work');
        labelEl.textContent = 'Štart!';
        totalMs = WORK_SECONDS * 1000;
        endsAt = performance.now() + totalMs;
        lastWholeSecond = -1;
        beep(1320, 0.35, 0.35);
        pulse();
        rafId = requestAnimationFrame(tick);
    }

    function finish() {
        state = 'done';
        setBodyState('done');
        labelEl.textContent = 'Hotovo';
        timerEl.textContent = '00:00';
        timerEl.classList.remove('danger');
        progressBar.style.width = '100%';
        beep(1760, 0.25, 0.35);
        setTimeout(() => beep(1760, 0.5, 0.35), 200);
        releaseWakeLock();
        startBtn.disabled = false;
        startBtn.textContent = 'Znovu';
    }

    function reset() {
        if (rafId) cancelAnimationFrame(rafId);
        rafId = null;
        releaseWakeLock();
        state = 'idle';
        setBodyState('idle');
        labelEl.textContent = 'Pripravený?';
        timerEl.textContent = '01:00';
        timerEl.classList.remove('danger');
        progressBar.style.width = '0%';
        startBtn.disabled = false;
        startBtn.textContent = 'Štart';
        resetBtn.disabled = true;
    }

    startBtn.addEventListener('click', () => {
        if (state === 'idle' || state === 'done') {
            reset();
            startPrep();
        }
    });

    resetBtn.addEventListener('click', reset);

    const fsBtn = document.getElementById('fsBtn');

    function isFullscreen() {
        return !!(document.fullscreenElement || document.webkitFullscreenElement);
    }

    function toggleFullscreen() {
        if (isFullscreen()) {
            (document.exitFullscreen || document.webkitExitFullscreen).call(document);
        } else {
            const el = document.documentElement;
            (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
        }
    }

    function syncFullscreenClass() {
        body.classList.toggle('is-fullscreen', isFullscreen());
    }

    fsBtn.addEventListener('click', toggleFullscreen);
    document.addEventListener('fullscreenchange', syncFullscreenClass);
    document.addEventListener('webkitfullscreenchange', syncFullscreenClass);

    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            if (state === 'idle' || state === 'done') startBtn.click();
        } else if (e.code === 'KeyR') {
            reset();
        } else if (e.code === 'KeyF') {
            toggleFullscreen();
        }
    });
})();
</script>
</body>
</html>
